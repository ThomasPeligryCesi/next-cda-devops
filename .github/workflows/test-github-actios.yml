on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building the project..." 
      - uses: actions/checkout@v6
      - run: ls -lah
      - run: npm ci
      - run: npm run build
      - run: npm run e2e:headless
      - run: echo "Running Cypress e2e test on chrome with GitHub Actions..."
      - name: Cypress e2e chrome
        uses: cypress-io/github-action@v7
        with:
          browser: chrome
          build: npm run build
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 60
      - run: echo "Running Cypress e2e test on chrome with GitHub Actions..."
      - name: Cypress e2e edge
        uses: cypress-io/github-action@v7
        with:
          browser: edge
          build: npm run build          
          start: npm start              
          wait-on: "http://localhost:3000" 
          wait-on-timeout: 60
          
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Running tests..." 
      - run: echo "Tests passed! (not yet)"