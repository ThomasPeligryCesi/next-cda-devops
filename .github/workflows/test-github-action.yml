on:
  push:
    branches:
      - '**'
    tags:
      - 'v**'

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Sauvegarde du cache
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/.cache/Cypress
            Dockerfile
            compose.prod.yml
            compose.yml
          key: ${{ runner.os }}-node2-${{ hashFiles('**/package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/checkout@v6
      - name: Récupération du cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node2-${{ hashFiles('**/package-lock.json') }}
          fail-on-cache-miss: 'true'
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        browser: [chrome, edge]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Récupération du cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node2-${{ hashFiles('**/package-lock.json') }}
      - uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run start
          browser: ${{ matrix.browser }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots

  build-and-push-docker:
    runs-on: ubuntu-latest
    # needs: [lint, test]
    # if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build and Push Docker Image
        run: |
          docker build --tag ghcr.io/${{ env.OWNER }}/next --target next ./
          docker push ghcr.io/${{ env.OWNER }}/next
  deploy-recette:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/developp'
    steps:
      - name: Configuration de la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AZURE_IP }} >> ~/.ssh/known_hosts
      - name: Déploiement en recette
        run: |
          ssh ${{ secrets.AZURE_ID }}@${{ secrets.AZURE_IP }} << 'EOF'
            cd recette/next-cda-devops
            git fetch --all
            git checkout developp
            git pull origin developp
            sudo docker compose pull --policy=always -f compose.recette.yml
            sudo docker compose -f compose.recette.yml up -d
          EOF

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Configuration de la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AZURE_IP }} >> ~/.ssh/known_hosts
      - name: Déploiement en production
        run: |
          ssh ${{ secrets.AZURE_ID }}@${{ secrets.AZURE_IP }} << 'EOF'
            cd production/next-cda-devops
            git fetch --all
            git checkout develop
            git pull origin develop
            sudo docker compose pull --policy=always
            sudo docker compose -f compose.prod.yml up -d
          EOF